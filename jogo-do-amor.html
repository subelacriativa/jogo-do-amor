<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Jogo do Amor ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #d63031;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            color: #4a4a4a;
            text-align: center;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            width: 100%;
        }

        /* Estrutura 3D da Carta */
        .card {
            height: 150px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        /* Classe que o JS vai adicionar para girar */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Frente da Carta (Escondido o desafio) */
        .card-front {
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            color: white;
            font-size: 40px;
            font-weight: bold;
            border: 3px solid #fff;
        }

        /* Verso da Carta (Onde aparece o desafio) */
        .card-back {
            background-color: white;
            color: #2d3436;
            transform: rotateY(180deg);
            font-size: 16px;
            font-weight: 600;
            border: 3px solid #ff7675;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>Nosso Jogo do Amor ❤️</h1>
    <p>Escolha uma carta por vez e cumpra o desafio...</p>

    <div class="grid-container" id="grid"></div>

    <script>
        // LISTA DE DESAFIOS (Você pode mudar as frases ou posições aqui!)
        const desafios = [
            "Tire uma peça de roupa 🔞",
            "Me faça uma massagem de 3 minutos 💆‍♂️",
            "Dê um beijo de cinema de 30 segundos 💋",
            "Posição: Do jeitinho que você mais gosta 🔥",
            "Tome um gole da sua bebida 🥂",
            "Fique sem falar por 1 minuto enquanto ganha carinho 🤫",
            "Posição: De conchinha (mas com segundas intenções) 😉",
            "Sussurre um desejo secreto no meu ouvido 💬"
        ];

        // Função para embaralhar os desafios (opcional, tire se quiser ordem fixa)
        desafios.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('grid');

        // Criar as cartas dinamicamente
        desafios.forEach((desafio, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">
                        ❤️
                    </div>
                    <div class="card-back">
                        ${desafio}
                    </div>
                </div>
            `;

            // Evento de clique para virar a carta
            card.addEventListener('click', function() {
                this.classList.toggle('flipped');
            });

            grid.appendChild(card);
        });
    </script>
</body>
</html>
